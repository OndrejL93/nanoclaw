<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoClaw Dashboard</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.03);
  --surfaceHover: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.07);
  --accent: #6366f1;
  --accent2: #9333ea;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --purple: #a78bfa;
  --text: #e5e5e5;
  --textStrong: #ffffff;
  --muted: #737373;
  --dim: #525252;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif;
  font-size: 13px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Glass card ── */
.glass {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: background 0.15s;
}
.glass:hover { background: var(--surfaceHover); }

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.header-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--textStrong);
  letter-spacing: -0.01em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.assistant-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px 4px 6px;
  font-size: 12px;
  color: var(--muted);
}

.assistant-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 220px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--dim);
  padding: 4px 8px 8px;
}

.agent-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.agent-card:hover {
  background: var(--surface);
  border-color: var(--border);
}
.agent-card.selected {
  background: rgba(99,102,241,0.12);
  border-color: rgba(99,102,241,0.3);
}

.agent-info { overflow: hidden; min-width: 0; }
.agent-name {
  font-weight: 500;
  color: var(--textStrong);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 13px;
}
.agent-folder {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Status dot ── */
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
}
.dot.active {
  background: var(--green);
  box-shadow: 0 0 0 2px rgba(74,222,128,0.2);
  animation: pulse 2s infinite;
}
.dot.idle {
  background: var(--yellow);
  box-shadow: 0 0 0 2px rgba(250,204,21,0.2);
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(74,222,128,0.2); }
  50% { box-shadow: 0 0 0 5px rgba(74,222,128,0.08); }
}

/* ── Main panel ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Empty state ── */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--dim);
}
#empty-state .empty-icon {
  font-size: 32px;
  opacity: 0.4;
}
#empty-state p { font-size: 13px; }

/* ── Chat view ── */
#chat-view {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}

/* ── Panel header ── */
#panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}
.panel-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
#panel-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--textStrong);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.status-badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.status-badge.active {
  background: rgba(74,222,128,0.1);
  color: var(--green);
  border: 1px solid rgba(74,222,128,0.2);
}
.status-badge.idle {
  background: rgba(250,204,21,0.1);
  color: var(--yellow);
  border: 1px solid rgba(250,204,21,0.2);
}
.status-badge.offline {
  background: rgba(255,255,255,0.04);
  color: var(--dim);
  border: 1px solid var(--border);
}

.header-actions { display: flex; gap: 8px; flex-shrink: 0; }

.btn-ghost {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
}
.btn-ghost:hover {
  background: var(--surfaceHover);
  color: var(--text);
  border-color: rgba(255,255,255,0.12);
}

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.msg-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.msg-meta {
  font-size: 10px;
  color: var(--dim);
  padding: 0 4px;
  margin-bottom: 2px;
}
.msg-group.from-me .msg-meta { text-align: right; }

.msg {
  max-width: 75%;
  padding: 9px 13px;
  border-radius: 10px;
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
  font-size: 13px;
  border: 1px solid transparent;
}
.msg-group.from-bot .msg {
  align-self: flex-start;
  background: rgba(99,102,241,0.08);
  border-color: rgba(99,102,241,0.18);
  color: var(--text);
}
.msg-group.from-me .msg {
  align-self: flex-end;
  background: var(--surface);
  border-color: var(--border);
  color: var(--text);
}
.msg-group.from-other .msg {
  align-self: flex-start;
  background: rgba(255,255,255,0.04);
  border-color: var(--border);
  color: var(--text);
}

/* ── Typing indicator ── */
.typing {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 9px 13px;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.18);
  border-radius: 10px;
}
.typing span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* ── Input bar ── */
#input-bar {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

#msg-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  color: var(--textStrong);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  resize: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.15s, background 0.15s;
}
#msg-input::placeholder { color: var(--dim); }
#msg-input:focus {
  border-color: rgba(99,102,241,0.5);
  background: rgba(255,255,255,0.04);
}

#send-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 0 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
#send-btn:hover { opacity: 0.85; }
#send-btn:disabled { opacity: 0.3; cursor: default; }

/* ── Token overlay ── */
#token-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
#token-overlay.hidden { display: none; }

.token-box {
  background: #111118;
  border: 1px solid rgba(99,102,241,0.3);
  border-radius: 16px;
  padding: 36px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 0 60px rgba(99,102,241,0.15);
}
.token-logo {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin: 0 auto 20px;
}
.token-box h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--textStrong);
  text-align: center;
  margin-bottom: 6px;
}
.token-box p {
  color: var(--muted);
  font-size: 13px;
  text-align: center;
  margin-bottom: 24px;
}
.token-box input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--textStrong);
  font-size: 14px;
  font-family: inherit;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.15s;
}
.token-box input:focus { border-color: rgba(99,102,241,0.5); }
.token-box button {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  padding: 11px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  transition: opacity 0.15s;
}
.token-box button:hover { opacity: 0.85; }
.token-box button:disabled { opacity: 0.4; cursor: default; }
#token-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 10px; min-height: 16px; }

/* ── Dialog ── */
dialog {
  background: #111118;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0;
  color: var(--text);
  width: min(660px, 94vw);
  max-height: 85dvh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}
dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }

.dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.dialog-header h2 { font-size: 14px; font-weight: 600; color: var(--textStrong); }
.dialog-close {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.dialog-close:hover { background: var(--surface); color: var(--text); }

#claude-md-textarea {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: none;
  resize: none;
  color: var(--text);
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 12px;
  line-height: 1.7;
  padding: 16px 20px;
  outline: none;
  min-height: 280px;
}

.dialog-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#claude-md-status { font-size: 12px; color: var(--muted); }
#claude-md-status.ok { color: var(--green); }
#claude-md-status.err { color: var(--red); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  padding: 8px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.35; cursor: default; }

/* ── Responsive ── */
@media (max-width: 600px) {
  #sidebar { width: 160px; }
  .msg { max-width: 88%; }
  .header-title { display: none; }
}
</style>
</head>
<body>

<!-- Token overlay -->
<div id="token-overlay">
  <div class="token-box">
    <div class="token-logo">🦞</div>
    <h2>NanoClaw Dashboard</h2>
    <p>Enter your access token to continue.</p>
    <input type="password" id="token-input" placeholder="Access token" autocomplete="current-password">
    <button id="token-submit">Continue</button>
    <div id="token-error"></div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo">🦞</div>
    <span class="header-title">NanoClaw Dashboard</span>
  </div>
  <div class="header-right">
    <div class="assistant-badge">
      <div class="assistant-avatar">✦</div>
      <span id="assistant-name">Andy</span>
    </div>
  </div>
</header>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-label">Agents</div>
    <div id="agent-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="empty-state">
      <div class="empty-icon">🦞</div>
      <p>Select an agent to start</p>
    </div>

    <div id="chat-view">
      <div id="panel-header">
        <div class="panel-title-row">
          <span id="panel-title">Agent</span>
          <span id="panel-status-badge" class="status-badge offline">Offline</span>
        </div>
        <div class="header-actions">
          <button class="btn-ghost" id="edit-claude-btn">Edit CLAUDE.md</button>
        </div>
      </div>

      <div id="messages"></div>

      <div id="input-bar">
        <textarea id="msg-input" placeholder="Send a message…" rows="1"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- CLAUDE.md dialog -->
<dialog id="claude-dialog">
  <div class="dialog-header">
    <h2>Edit CLAUDE.md</h2>
    <button class="dialog-close" id="close-dialog">✕</button>
  </div>
  <textarea id="claude-md-textarea" spellcheck="false"></textarea>
  <div class="dialog-footer">
    <span id="claude-md-status"></span>
    <button class="btn-primary" id="save-claude-md">Save</button>
  </div>
</dialog>

<script>
(function () {
  const TOKEN_KEY = 'nk_token';
  let token = localStorage.getItem(TOKEN_KEY) || '';
  let selectedJid = null;
  let groups = [];
  let assistantName = 'Andy';
  let pollTimer = null;
  let lastMsgTimestamp = {};

  // ── Auth ────────────────────────────────────────────────────────
  const overlay   = document.getElementById('token-overlay');
  const tokenIn   = document.getElementById('token-input');
  const tokenBtn  = document.getElementById('token-submit');
  const tokenErr  = document.getElementById('token-error');

  if (token) overlay.classList.add('hidden');

  async function tryToken(t) {
    const r = await fetch('/api/status', { headers: { Authorization: 'Bearer ' + t } });
    return r.status !== 401;
  }

  tokenBtn.addEventListener('click', async () => {
    const t = tokenIn.value.trim();
    if (!t) return;
    tokenErr.textContent = '';
    tokenBtn.disabled = true;
    try {
      if (await tryToken(t)) {
        token = t;
        localStorage.setItem(TOKEN_KEY, t);
        overlay.classList.add('hidden');
        startPolling();
      } else {
        tokenErr.textContent = 'Invalid token.';
      }
    } catch { tokenErr.textContent = 'Connection error.'; }
    tokenBtn.disabled = false;
  });
  tokenIn.addEventListener('keydown', e => { if (e.key === 'Enter') tokenBtn.click(); });
  setTimeout(() => tokenIn.focus(), 50);

  // ── API ─────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { Authorization: 'Bearer ' + token } };
    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(path, opts);
    if (r.status === 401) {
      token = ''; localStorage.removeItem(TOKEN_KEY);
      overlay.classList.remove('hidden');
      throw new Error('Unauthorized');
    }
    return r;
  }

  // ── Status ──────────────────────────────────────────────────────
  async function fetchStatus() {
    const r = await api('GET', '/api/status');
    const d = await r.json();
    assistantName = d.assistantName || 'Andy';
    document.getElementById('assistant-name').textContent = assistantName;
    groups = d.groups || [];
    renderSidebar();
    if (selectedJid) updatePanelHeader();
  }

  function dotClass(g) {
    if (g.active && !g.idleWaiting) return 'active';
    if (g.idleWaiting) return 'idle';
    return '';
  }

  function badgeClass(g) {
    if (g.active && !g.idleWaiting) return 'active';
    if (g.idleWaiting) return 'idle';
    return 'offline';
  }

  function badgeText(g) {
    if (g.active && !g.idleWaiting) return g.isTaskContainer ? 'Running task' : 'Active';
    if (g.idleWaiting) return 'Idle';
    return 'Offline';
  }

  function renderSidebar() {
    const list = document.getElementById('agent-list');
    // update in-place to avoid flicker on selection
    const existing = new Map([...list.querySelectorAll('[data-jid]')].map(el => [el.dataset.jid, el]));
    for (const g of groups) {
      let card = existing.get(g.jid);
      if (!card) {
        card = document.createElement('div');
        card.className = 'agent-card';
        card.dataset.jid = g.jid;
        card.innerHTML = `<span class="dot"></span><div class="agent-info"><div class="agent-name"></div><div class="agent-folder"></div></div>`;
        card.addEventListener('click', () => selectAgent(g.jid));
        list.appendChild(card);
      }
      card.className = 'agent-card' + (g.jid === selectedJid ? ' selected' : '');
      card.querySelector('.dot').className = 'dot ' + dotClass(g);
      card.querySelector('.agent-name').textContent = g.name || g.folder;
      card.querySelector('.agent-folder').textContent = g.folder;
    }
    // Remove stale cards
    for (const [jid, el] of existing) {
      if (!groups.find(g => g.jid === jid)) el.remove();
    }
  }

  // ── Agent selection ─────────────────────────────────────────────
  function selectAgent(jid) {
    selectedJid = jid;
    document.getElementById('empty-state').style.display = 'none';
    const cv = document.getElementById('chat-view');
    cv.style.display = 'flex';
    renderSidebar();
    updatePanelHeader();
    fetchMessages();
  }

  function updatePanelHeader() {
    const g = groups.find(x => x.jid === selectedJid);
    if (!g) return;
    document.getElementById('panel-title').textContent = g.name + (g.folder !== g.name ? ' · ' + g.folder : '');
    const badge = document.getElementById('panel-status-badge');
    badge.className = 'status-badge ' + badgeClass(g);
    badge.textContent = badgeText(g);
  }

  // ── Messages ────────────────────────────────────────────────────
  async function fetchMessages() {
    if (!selectedJid) return;
    const r = await api('GET', '/api/messages?jid=' + encodeURIComponent(selectedJid) + '&limit=100');
    const d = await r.json();
    renderMessages(d.messages || []);
  }

  function renderMessages(msgs) {
    const el = document.getElementById('messages');
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    const key = selectedJid;
    const newTs = msgs.length ? msgs[msgs.length - 1].timestamp : '';
    if (newTs === lastMsgTimestamp[key] && el.childElementCount > 0) return;
    lastMsgTimestamp[key] = newTs;

    el.innerHTML = '';
    for (const m of msgs) {
      const isBot = !!m.is_bot_message;
      const isMe = !!m.is_from_me && !isBot;
      const groupClass = isBot ? 'from-bot' : isMe ? 'from-me' : 'from-other';

      const group = document.createElement('div');
      group.className = 'msg-group ' + groupClass;

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      const t = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      meta.textContent = (isBot ? assistantName : (m.sender_name || m.sender || 'User')) + ' · ' + t;

      const bubble = document.createElement('div');
      bubble.className = 'msg';
      bubble.textContent = m.content;

      group.appendChild(meta);
      group.appendChild(bubble);
      el.appendChild(group);
    }

    if (atBottom || !lastMsgTimestamp[key]) el.scrollTop = el.scrollHeight;
  }

  // ── Send ────────────────────────────────────────────────────────
  const msgInput = document.getElementById('msg-input');
  const sendBtn  = document.getElementById('send-btn');

  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });

  sendBtn.addEventListener('click', async () => {
    if (!selectedJid) return;
    let text = msgInput.value.trim();
    if (!text) return;
    const g = groups.find(x => x.jid === selectedJid);
    if (g && g.requiresTrigger) {
      const trigger = '@' + assistantName;
      if (!text.toLowerCase().startsWith(trigger.toLowerCase())) text = trigger + ' ' + text;
    }
    sendBtn.disabled = true;
    try {
      await api('POST', '/api/send', { jid: selectedJid, text });
      msgInput.value = '';
      msgInput.style.height = '';
      await fetchMessages();
    } catch (err) {
      if (err.message !== 'Unauthorized') alert('Send failed: ' + err.message);
    }
    sendBtn.disabled = false;
    msgInput.focus();
  });

  // ── CLAUDE.md editor ────────────────────────────────────────────
  const editBtn    = document.getElementById('edit-claude-btn');
  const claudeDlg  = document.getElementById('claude-dialog');
  const mdTextarea = document.getElementById('claude-md-textarea');
  const saveBtn    = document.getElementById('save-claude-md');
  const mdStatus   = document.getElementById('claude-md-status');
  const closeBtn   = document.getElementById('close-dialog');

  editBtn.addEventListener('click', async () => {
    const g = groups.find(x => x.jid === selectedJid);
    if (!g) return;
    mdStatus.textContent = 'Loading…'; mdStatus.className = '';
    claudeDlg.showModal();
    try {
      const r = await api('GET', '/api/claude-md?folder=' + encodeURIComponent(g.folder));
      const d = await r.json();
      mdTextarea.value = d.content || '';
      mdStatus.textContent = '';
    } catch { mdStatus.textContent = 'Failed to load.'; mdStatus.className = 'err'; }
  });

  closeBtn.addEventListener('click', () => claudeDlg.close());
  claudeDlg.addEventListener('click', e => { if (e.target === claudeDlg) claudeDlg.close(); });

  saveBtn.addEventListener('click', async () => {
    const g = groups.find(x => x.jid === selectedJid);
    if (!g) return;
    mdStatus.textContent = 'Saving…'; mdStatus.className = '';
    saveBtn.disabled = true;
    try {
      await api('PUT', '/api/claude-md?folder=' + encodeURIComponent(g.folder), { content: mdTextarea.value });
      mdStatus.textContent = 'Saved!'; mdStatus.className = 'ok';
    } catch (err) {
      mdStatus.textContent = 'Failed: ' + (err.message || '?'); mdStatus.className = 'err';
    }
    saveBtn.disabled = false;
  });

  // ── Polling ─────────────────────────────────────────────────────
  async function refresh() {
    try {
      await fetchStatus();
      if (selectedJid) await fetchMessages();
    } catch (err) {
      if (err.message !== 'Unauthorized') console.warn('Poll error:', err);
    }
  }

  function startPolling() {
    clearInterval(pollTimer);
    refresh();
    pollTimer = setInterval(refresh, 3000);
  }

  if (token) startPolling();
})();
</script>
</body>
</html>
